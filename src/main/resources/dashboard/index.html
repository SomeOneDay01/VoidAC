<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>VAC Dashboard</title>
<link rel="stylesheet" href="dashboard.css">
</head>
<body>
<nav><div class="nav-inner"><span class="brand">VAC Anti-Cheat</span><span id="navTime"></span></div></nav>
<div class="container">
<aside><ul><li class="active" data-tab="overview">Overview</li><li data-tab="players">Players</li></ul></aside>
<main>
<section id="tab-overview" class="tab active">
<div class="cards"><div class="card"><div class="label">Online Players</div><div class="value" id="stat-online">-</div></div>
<div class="card"><div class="label">Tracked Players</div><div class="value" id="stat-tracked">-</div></div>
<div class="card"><div class="label">Total Bans</div><div class="value" id="stat-bans">-</div></div>
<div class="card"><div class="label">TPS</div><div class="value" id="stat-tps">-</div></div></div>
<h2>Top Confidence</h2><div class="table-wrapper"><table id="topTable"><thead><tr><th>#</th><th>Player</th><th>Confidence</th><th>Violations</th></tr></thead><tbody></tbody></table></div>
</section>
<section id="tab-players" class="tab">
<div class="search-bar"><input type="text" id="playerSearch" placeholder="Search player..."><button id="refreshBtn">Refresh</button></div>
<div class="table-wrapper"><table id="playersTable"><thead><tr><th>Player</th><th>Confidence</th><th>Violations</th><th>Ping</th><th>Health</th></tr></thead><tbody></tbody></table></div>
</section>
</main>
</div>
<script src="dashboard.js"></script>
</body>
</html>
