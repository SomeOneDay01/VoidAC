# Report Settings
report:
  confidence_increment: 5.0

# Discord/Telegram Webhook
webhook:
  enabled: false
  discord_url: ""
  alert_webhook: false
  ban_webhook: true

# Discord Bot (JDA)
discord:
  enabled: false
  token: ""
  channel_id: ""
  guild_id: ""
  allowed_role: ""

# Web Dashboard
dashboard:
  port: 8080
  password: "changeme"

# KillAura Detection
killaura:
  # Порог общей оценки (0-100) для повышения уверенности
  threshold: 60.0
  # На сколько увеличивать уверенность при обнаружении
  confidence_increment: 3.0
  # Максимальный легитимный CPS (выше = подозрение)
  max_cps: 8.0
  # Максимальная легитимная дистанция (выше = подозрение)
  max_reach: 3.5
  # Минимальное легитимное отклонение прицела (ниже = подозрение, идеальный прицел)
  min_aim_deviation: 0.8
  # Максимальный процент атак через стены
  max_wall_ratio: 5.0

# Alert Settings
alerts:
  enabled: true
  thresholds:
    - 30
    - 50
    - 70
    - 90

# SQLite (автоматически включен если mysql.enabled: false)
sqlite:
  enabled: true

# Bungee/Velocity синхронизация
bungee:
  enabled: false

# Anti-Xray детекция
antixray:
  enabled: true

# Auto-Updater
updater:
  enabled: true
  notify_on_join: true

# Advanced Settings
advanced:
  # Интервал обновления данных в тиках
  update_interval_ticks: 20
  # Асинхронная загрузка данных
  async_loading: true
  # Debug режим
  debug: false
  # Логировать все действия в файл
  log_to_file: true
  # Максимальное количество данных в кэше
  cache_size: 1000
  # Время жизни кэша в минутах
  cache_lifetime_minutes: 30
