# ============================================
# VAC Anti-Cheat Configuration
# ============================================

# MySQL Database Configuration
mysql:
  enabled: false
  host: localhost
  port: 3306
  database: vac_anticheat
  username: root
  password: ""
  useSSL: false
  poolSize: 10
  table_prefix: vac_

# Confidence System
confidence:
  # На сколько увеличивается уверенность при одном нарушении
  increment_per_violation: 2.0
  # Максимальная уверенность (в процентах)
  max_confidence: 100.0
  # При какой уверенности банить
  ban_threshold: 100.0
  # На сколько уменьшается уверенность в секунду (если нет нарушений)
  decay_per_second: 0.5
  # Через сколько секунд после последнего нарушения начинается уменьшение
  decay_delay_seconds: 30
  # Как часто проверять уверенность (в секундах)
  check_interval_seconds: 3
  # Сколько нарушений одного типа нужно для подозрения (мультипликатор уверенности)
  violation_multiplier: 1.5
  # Автоматически ли банить при достижении ban_threshold
  auto_ban: true
  # Минимальная уверенность для команды /vac ban
  min_confidence_for_manual_ban: 0.0

# Animation Settings
animation:
  # Включить анимацию при бане
  enabled: true
  # Длительность анимации (в тиках, 20 тиков = 1 секунда)
  duration_ticks: 60
  # Количество витков спирали
  spiral_loops: 3
  # Количество частиц на виток
  particles_per_loop: 30
  # Высота подъема
  lift_height: 5.0
  # Частица для спирали (https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Particle.html)
  spiral_particle: FLAME
  # Частица для следа
  trail_particle: REDSTONE
  # Частица для взрыва
  explosion_particle: EXPLOSION_LARGE
  # Частицы осколков
  shrapnel_particle: FIREWORKS_SPARK
  # Дропать ли ресурсы игрока при бане
  drop_items: true
  # Забирать ли опыт
  drop_xp: true
  # Забирать ли броню
  drop_armor: true
  # Громкость звука взрыва
  explosion_volume: 2.0
  explosion_pitch: 0.8
  # Звук при подъеме
  lift_sound: ENTITY_BLAZE_AMBIENT
  lift_volume: 0.5
  lift_pitch: 1.0
  # Звук бана
  ban_sound: ENTITY_WITHER_DEATH
  ban_volume: 1.0
  ban_pitch: 0.5
  # Звук взрыва
  explosion_sound: ENTITY_GENERIC_EXPLODE

# Lag System (FakeLags)
lags:
  # Время лага по умолчанию (в секундах)
  default_duration: 15
  # Максимальное время лага (в секундах)
  max_duration: 120
  # Категории лагов
  categories:
    connection:
      enabled: true
      description: "Симуляция проблем с соединением"
      duration_multiplier: 1.0
      packet_delay_ticks: 40
      cancel_movement: true
    block:
      enabled: true
      description: "Симуляция лагов с блоками"
      duration_multiplier: 1.0
      packet_delay_ticks: 60
      cancel_movement: true
    entity:
      enabled: true
      description: "Симуляция лагов с сущностями"
      duration_multiplier: 1.0
      packet_delay_ticks: 30
      cancel_movement: false
    all:
      enabled: true
      description: "Симуляция всех типов лагов"
      duration_multiplier: 1.5
      packet_delay_ticks: 80
      cancel_movement: true

# Punishment Settings
punishment:
  # Оповещать всех в чате
  broadcast: true
  # Команды, выполняемые от имени консоли при бане (поддержка плейсхолдеров: {player}, {uuid})
  console_commands:
    - "ban {player} [VAC] Cheating detected! Уверенность: {confidence}%"
    - "say &c[VAC] &7Игрок &c{player} &7был забанен за использование читов (уверенность: {confidence}%)"
  # Команды, выполняемые от имени оператора
  commands: []
  # Команды, выполняемые при подозрении (уверенность > 50%)
  suspicion_commands:
    - "say &e[VAC] &7Игрок &c{player} &7под подозрением (уверенность: {confidence}%)"
  # Команды, выполняемые при уверенности 100%
  ban_commands_override: false
  ban_commands:
    - "ban-ip {player} [VAC] Cheating detected!"
  # Сообщение при кике/бане
  kick_message: |
    &c&lVAC Anti-Cheat
    &7Вы были забанены анти-читом VAC.
    &7Причина: Использование запрещённых модификаций
    &7Уверенность: {confidence}%
    
    &7Если вы считаете, что это ошибка,
    &7обратитесь к администрации сервера.

